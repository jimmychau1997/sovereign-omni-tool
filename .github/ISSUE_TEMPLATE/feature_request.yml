name: 🚀 Feature Request
description: Suggest an idea or enhancement for Sovereign Omni-Tool
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make `sov` even more useful? We'd love to hear it!

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: >
        What problem are you trying to solve? Is your request related to a
        frustration or missing capability?
      placeholder: "I often need to … but currently have to …"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or change you'd like to see.
      placeholder: |
        Add a `sov <new_tool>` command that …
        The CLI interface could look like: …
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: >
        Have you tried any workarounds or considered other approaches?
        Why do they fall short?
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Tool Category (if applicable)
      description: Which category would a new tool belong to?
      options:
        - System & DevOps Operations
        - Security & Reconnaissance
        - Developer Utilities
        - Data & Media Processing
        - Core dispatcher / CLI
        - MCP server
        - Documentation
        - Other / Not applicable
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, mockups, related issues, or anything else helpful.
